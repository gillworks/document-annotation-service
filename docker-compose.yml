services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: annotations
      POSTGRES_USER: annotations
      POSTGRES_PASSWORD: annotations
    # Published on 55432 instead of 5432 so reviewers can inspect the DB
    # locally without colliding with a host Postgres install.
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U annotations -d annotations"]
      interval: 2s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://annotations:annotations@db:5432/annotations
    restart: "no"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg://annotations:annotations@db:5432/annotations
      UPLOAD_DIR: /data/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANNOTATOR_MODE: ${ANNOTATOR_MODE:-openai}
      ANNOTATOR_MODEL: ${ANNOTATOR_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      INPUT_TOKEN_COST_PER_1M: ${INPUT_TOKEN_COST_PER_1M:-0}
      OUTPUT_TOKEN_COST_PER_1M: ${OUTPUT_TOKEN_COST_PER_1M:-0}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-26214400}
    volumes:
      - .:/app
      - uploads:/data/uploads

  worker:
    build: .
    command: python -m app.worker
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg://annotations:annotations@db:5432/annotations
      UPLOAD_DIR: /data/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANNOTATOR_MODE: ${ANNOTATOR_MODE:-openai}
      ANNOTATOR_MODEL: ${ANNOTATOR_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      INPUT_TOKEN_COST_PER_1M: ${INPUT_TOKEN_COST_PER_1M:-0}
      OUTPUT_TOKEN_COST_PER_1M: ${OUTPUT_TOKEN_COST_PER_1M:-0}
      WORKER_ID: ${WORKER_ID:-worker-1}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-1}
      WORKER_SWEEP_INTERVAL_SECONDS: ${WORKER_SWEEP_INTERVAL_SECONDS:-30}
      WORKER_STALE_AFTER_SECONDS: ${WORKER_STALE_AFTER_SECONDS:-600}
    volumes:
      - .:/app
      - uploads:/data/uploads

volumes:
  pgdata:
  uploads:
